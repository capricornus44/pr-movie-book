version: '3.8'

services:
  # 1. PostgreSQL (Transactional database for halls, showtimes, and bookings)
  postgres:
    image: postgres:18.4-alpine
    container_name: moviebook_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. MongoDB (NoSQL database for the movie catalog and reviews)
  mongodb:
    image: mongo:8.0
    container_name: moviebook_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - '${MONGO_PORT}:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
volumes:
  postgres_data:
  mongodb_data:
